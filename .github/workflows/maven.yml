name: Test Automation Framework Workflow

permissions:
  contents: write
  
on:
  schedule:
    - cron: 00 18 * * *
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Running Test Automation Framework with Maven
      run: mvn test -X -Dbrowser=chrome -DisHeadless=true -DisLambdaTest=true
    - name: Upload Test logs
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Test logs
        path: logs/

    - name: Upload Screenshots or Artifacts
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: screenshots
        path: screenshots/        
        
    - name: Upload Test reports
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Test reports
        path: report.html

    - name: Test Execution Status
      run: echo "Test Execution is Completed"

    - name: copy Report to gh-pages Folder
      if: always()
      run: |
        mkdir -p public/extent-reports
        mkdir -p public/extent-reports/screenshots
        cp report.html public/extent-reports/ || true
        cp -R screenshots/ public/extent-reports/screenshots/ || true
        ls -l public/extent-reports/

    - name: Deploy
      if: always()
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: public/extent-reports/
        token: ${{ github.token }}
        clean: true
