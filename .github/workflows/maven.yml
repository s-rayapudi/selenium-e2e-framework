name: Test Automation Framework Workflow

on:
  schedule:
    - cron: 00 18 * * *
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Running Test Automation Framework with Maven
      run: mvn test -X -Dbrowser=chrome -DisHeadless=false -DisLambdaTest=true
    - name: Upload Test logs
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Test logs
        path: logs/
        
    - name: Upload Test reports
      if: always()
      uses: actions/upload-artifact@v7.0.1
      with:
        name: Test reports
        path: report.html

    - name: Test Execution Status
      run: echo "Test Execution is Completed"
